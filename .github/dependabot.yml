# .github/dependabot.yml
version: 2

updates:
  # ─────────────────────────────────────────────────────────────
  # npm / yarn / pnpm — all three share the "npm" ecosystem.
  # Dependabot picks the right tool based on the lockfile present:
  #   package-lock.json  → npm
  #   yarn.lock          → yarn
  #   pnpm-lock.yaml     → pnpm
  # ─────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Prague"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      # Batch the boring stuff into one PR; keep majors separate.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      types-definitions:
        patterns:
          - "@types/*"
    ignore:
      # Example: hold major bumps on framework-level deps for manual review.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # ─────────────────────────────────────────────────────────────
  # Bun — separate ecosystem. Requires a text-based bun.lock file.
  # Run `bun install --save-text-lockfile` once if you're still on
  # bun.lockb; from Bun 1.2 onward it's the default.
  # ─────────────────────────────────────────────────────────────
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Prague"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "bun"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ─────────────────────────────────────────────────────────────
  # Keep the pipeline itself current too. Cheap insurance.
  # ─────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
